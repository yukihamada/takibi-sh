name = "takibi-sh"
main = "src/worker.js"
compatibility_date = "2026-06-01"
workers_dev = false  # *.workers.dev URL を出さない（takibi.sh だけで配る）

# Custom Domains で配る。custom_domain=true なら wrangler deploy が
# 当該ゾーンに proxied DNS レコードと edge 証明書を自動作成する。
# → 粟田さんは「DNSレコードを手で作る」作業が不要。deploy 一発で解決する。
# 前提: ゾーン takibi.sh が wrangler login したアカウントに紐づいていること。
routes = [
  { pattern = "takibi.sh", custom_domain = true },
  { pattern = "www.takibi.sh", custom_domain = true },
]
