name = "takibi-sh"
main = "src/worker.js"
compatibility_date = "2026-06-01"

# takibi.sh は Cloudflare 管理（NS=cloudflare）。Worker をドメイン全体に当てる。
# 注意: routes を使うには Cloudflare ダッシュボードでゾーン takibi.sh が
# このアカウントに紐づいている必要がある（粟田さんのアカウント）。
routes = [
  { pattern = "takibi.sh/*", zone_name = "takibi.sh" },
  { pattern = "www.takibi.sh/*", zone_name = "takibi.sh" },
]
